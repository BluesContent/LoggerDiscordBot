name: Checar Drive e avisar no Discord

on:
  # Agendamento automatico PAUSADO por enquanto (o bot esta rodando local).
  # Para retomar na nuvem, descomente as duas linhas abaixo.
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  checar:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar o endpoint de checagem na Vercel
        run: |
          curl -sf -X POST "${{ secrets.VERCEL_APP_URL }}/api/cron" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 55 \
            -o response.json -w "\nHTTP %{http_code}\n"
          cat response.json
